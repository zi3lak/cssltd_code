name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun turbo typecheck
      - run: bun lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # packages/cssltd-sandbox confines tool execution via bubblewrap (bwrap);
      # it's not present on the base ubuntu-latest image.
      - run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - run: bun install --frozen-lockfile
      - run: bun run test:ci
        working-directory: packages/cssltdcode
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: packages/cssltdcode/.artifacts/unit/junit.xml
          retention-days: 14

  gateway-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun test
        working-directory: packages/cssltd-gateway

  forbidden-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run script/check-forbidden-strings.ts
