name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun turbo typecheck
      - run: bun lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # packages/cssltd-sandbox confines tool execution via bubblewrap (bwrap);
      # it's not present on the base ubuntu-latest image.
      - run: sudo apt-get update && sudo apt-get install -y bubblewrap
      # Ubuntu 24.04 (current ubuntu-latest) blocks unprivileged user namespaces via
      # AppArmor by default, which bwrap needs to create its sandbox; without this,
      # every bwrap invocation fails with "setting up uid map: Permission denied"
      # and every test that spawns a real subprocess through the sandbox fails.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: bun install --frozen-lockfile
      - run: bun run test:ci
        working-directory: packages/cssltdcode
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit
          path: packages/cssltdcode/.artifacts/unit/junit.xml
          retention-days: 14

  gateway-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun test
        working-directory: packages/cssltd-gateway

  forbidden-strings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run script/check-forbidden-strings.ts
